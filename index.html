<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphing Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>Graph</h1>
                <p>mathematical plotter</p>
            </div>
            
            <!-- Graph Tab -->
            <div class="tab-content active" id="graphTab">
                <div class="calc-input-section">
                    <input type="text" class="quick-calc-input" id="quickCalcInput" placeholder="Enter expression or equation, e.g. 2x+3=7">
                    <div class="quick-calc-result" id="quickCalcResult"></div>
                </div>
                
                <div class="functions" id="functionsList">
                    <!-- Functions will be added here -->
                </div>
                
                <button class="add-function" id="addFunction">+ Add Function</button>
                
                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">Viewport Range</label>
                        <div class="control-row">
                            <input type="number" class="control-input" id="xMin" value="-10" step="0.5">
                            <input type="number" class="control-input" id="xMax" value="10" step="0.5">
                        </div>
                        <div class="control-row" style="margin-top: 8px;">
                            <input type="number" class="control-input" id="yMin" value="-10" step="0.5">
                            <input type="number" class="control-input" id="yMax" value="10" step="0.5">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">Grid Options</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showGrid" checked>
                            <label for="showGrid">Show Grid</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showAxes" checked>
                            <label for="showAxes">Show Axes</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showLabels" checked>
                            <label for="showLabels">Show Labels</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="graphCanvas"></canvas>
            
            <div class="trace-info" id="traceInfo">
                <div>x: <span id="traceX">0</span></div>
                <div>y: <span id="traceY">0</span></div>
                <div>f(x): <span id="traceF">0</span></div>
            </div>
            
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomIn">+</button>
                <button class="zoom-btn" id="zoomOut">−</button>
                <button class="zoom-btn" id="resetZoom" style="font-size: 16px;">⟲</button>
            </div>
            
            <div class="instructions">
                <div>• Click and drag to pan</div>
                <div>• Scroll to zoom</div>
                <div>• Hover over curves to trace</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
