<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphing Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
    <link type="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>Graph</h1>
                <p>mathematical plotter</p>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="graph">Graph</button>
                <button class="tab" data-tab="solve">Solve</button>
            </div>
            
            <!-- Graph Tab -->
            <div class="tab-content active" id="graphTab">
                <div class="functions" id="functionsList">
                    <!-- Functions will be added here -->
                </div>
                
                <button class="add-function" id="addFunction">+ Add Function</button>
                
                <div class="controls">
                    <div class="control-group">
                        <label class="control-label">Viewport Range</label>
                        <div class="control-row">
                            <input type="number" class="control-input" id="xMin" value="-10" step="0.5">
                            <input type="number" class="control-input" id="xMax" value="10" step="0.5">
                        </div>
                        <div class="control-row" style="margin-top: 8px;">
                            <input type="number" class="control-input" id="yMin" value="-10" step="0.5">
                            <input type="number" class="control-input" id="yMax" value="10" step="0.5">
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">Grid Options</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showGrid" checked>
                            <label for="showGrid">Show Grid</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showAxes" checked>
                            <label for="showAxes">Show Axes</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="showLabels" checked>
                            <label for="showLabels">Show Labels</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Solve Tab -->
            <div class="tab-content" id="solveTab">
                <div class="solve-container">
                    <div class="calculator-input-area">
                        <div class="calc-display" id="calcDisplay">0</div>
                        <input type="text" class="calc-input" id="calcInput" placeholder="Enter expression or equation...">
                    </div>
                    
                    <div class="calc-buttons">
                        <button class="calc-btn" data-value="7">7</button>
                        <button class="calc-btn" data-value="8">8</button>
                        <button class="calc-btn" data-value="9">9</button>
                        <button class="calc-btn operator" data-value="/">/</button>
                        
                        <button class="calc-btn" data-value="4">4</button>
                        <button class="calc-btn" data-value="5">5</button>
                        <button class="calc-btn" data-value="6">6</button>
                        <button class="calc-btn operator" data-value="*">×</button>
                        
                        <button class="calc-btn" data-value="1">1</button>
                        <button class="calc-btn" data-value="2">2</button>
                        <button class="calc-btn" data-value="3">3</button>
                        <button class="calc-btn operator" data-value="-">−</button>
                        
                        <button class="calc-btn" data-value="0">0</button>
                        <button class="calc-btn" data-value=".">.</button>
                        <button class="calc-btn clear" data-value="C">C</button>
                        <button class="calc-btn operator" data-value="+">+</button>
                        
                        <button class="calc-btn" data-value="(">(</button>
                        <button class="calc-btn" data-value=")">)</button>
                        <button class="calc-btn" data-value="x">x</button>
                        <button class="calc-btn" data-value="^">^</button>
                        
                        <button class="calc-btn equals" data-value="=">=</button>
                        <button class="calc-btn operator" data-value="sqrt">√</button>
                        <button class="calc-btn operator" data-value="sin">sin</button>
                    </div>
                    
                    <div class="history">
                        <div class="history-title">History</div>
                        <div id="historyList"></div>
                        <button class="clear-history" id="clearHistory">Clear History</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="graphCanvas"></canvas>
            
            <div class="trace-info" id="traceInfo">
                <div>x: <span id="traceX">0</span></div>
                <div>y: <span id="traceY">0</span></div>
                <div>f(x): <span id="traceF">0</span></div>
            </div>
            
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomIn">+</button>
                <button class="zoom-btn" id="zoomOut">−</button>
                <button class="zoom-btn" id="resetZoom" style="font-size: 16px;">⟲</button>
            </div>
            
            <div class="instructions">
                <div>• Click and drag to pan</div>
                <div>• Scroll to zoom</div>
                <div>• Hover over curves to trace</div>
            </div>
        </div>
    </div>
    <script href="script.js"></script>
</body>
</html>
